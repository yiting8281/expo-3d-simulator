<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPO 展場配置模擬器 </title>
    <style>
        :root {
            --bg-glass: rgba(22, 22, 25, 0.82);
            --bg-glass-card: rgba(35, 35, 40, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --border-glass-focus: rgba(0, 149, 255, 0.5);
            --primary: #0084ff;
            --primary-hover: #006cc7;
            --accent: #ff9f0a;
            --success: #34c759;
            --danger: #ff453a;
            --text-main: #f5f5f7;
            --text-secondary: #98989d;
            --radius-sm: 8px;
            --radius-md: 12px;
            --shadow-subtle: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111113;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        .glass-panel {
            position: absolute;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px;
            border-radius: var(--radius-md);
            color: var(--text-main);
            box-shadow: var(--shadow-subtle);
            z-index: 10;
            border: 1px solid var(--border-glass);
            max-height: 94vh;
            overflow-y: auto;
        }

        #ui-panel-left { top: 20px; left: 20px; width: 330px; max-height: calc(100vh - 180px); }
        #ui-panel-right { top: 20px; right: 20px; width: 330px; border: 1px solid rgba(0, 132, 255, 0.3); display: none; }

        #ui-panel-view-presets {
            position: absolute; top: 20px; right: 370px; z-index: 10; display: flex; gap: 6px;
            background: var(--bg-glass); backdrop-filter: blur(20px); padding: 6px;
            border-radius: var(--radius-sm); border: 1px solid var(--border-glass); box-shadow: var(--shadow-subtle);
        }

        #ui-panel-controls-help {
            position: absolute; bottom: 20px; left: 20px; z-index: 10; width: 330px;
            background: var(--bg-glass); backdrop-filter: blur(20px); padding: 12px 14px;
            border-radius: var(--radius-md); border: 1px solid var(--border-glass); box-shadow: var(--shadow-subtle); color: var(--text-main);
        }

        .help-title { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .help-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; font-size: 11px; color: var(--text-secondary); }
        .help-item { display: flex; align-items: center; gap: 4px; }
        .help-key { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 4px; padding: 1px 5px; font-size: 10px; color: #fff; font-weight: 500; }

        #expo-title-input {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px dashed var(--border-glass-focus);
            border-radius: var(--radius-sm); color: var(--text-main); font-size: 13px; font-weight: 500;
            padding: 8px 10px; outline: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 2px;
        }

        h3 { margin-bottom: 10px; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
        .section { margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; margin-top: 8px; }

        button {
            width: 100%; padding: 9px 12px; background-color: rgba(255, 255, 255, 0.06); color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: var(--radius-sm); cursor: pointer;
            font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; justify-content: center;
            gap: 8px; font-size: 12px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        button:hover { background-color: rgba(255, 255, 255, 0.12); border-color: rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
        button.action-btn { background-color: rgba(0, 132, 255, 0.12); border-color: rgba(0, 132, 255, 0.3); color: #4da6ff; }
        button.action-btn:hover { background-color: rgba(0, 132, 255, 0.22); border-color: var(--primary); color: #fff; }
        button.load-btn { background-color: rgba(0, 132, 255, 0.08); border-color: rgba(0, 132, 255, 0.2); color: #4da6ff; }
        button.save-btn { background-color: rgba(52, 199, 89, 0.12); border-color: rgba(52, 199, 89, 0.3); color: #30d158; }
        button.img-btn { background-color: rgba(90, 200, 250, 0.12); border-color: rgba(90, 200, 250, 0.3); color: #64d2ff; }

        .grid-map { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: rgba(0, 0, 0, 0.3); padding: 6px; border-radius: var(--radius-sm); margin-bottom: 8px; }
        .grid-cell { aspect-ratio: 1; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--text-secondary); }
        .grid-cell.active { background: var(--success); border-color: transparent; color: white; font-weight: 600; }

        #right-obj-title { font-size: 13px; color: var(--accent); font-weight: 600; margin-bottom: 12px; text-align: center; background: rgba(255, 159, 10, 0.08); padding: 8px; border-radius: var(--radius-sm); border: 1px solid rgba(255, 159, 10, 0.2); }
        .two-btn-group { display: flex; gap: 6px; }
        .two-btn-group button { font-size: 11px; padding: 7px; }
        .struct-box { background: var(--bg-glass-card); padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid rgba(255, 255, 255, 0.04); margin-top: 8px; }
        .wall-checkboxes { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; padding-top: 6px; border-top: 1px dashed rgba(255, 255, 255, 0.08); }
        .wall-checkboxes label { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); cursor: pointer; margin: 0; }

        .dim-input-group { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; margin-bottom: 8px; }
        .dim-input-box { background: rgba(0, 0, 0, 0.25); padding: 5px 3px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.06); text-align: center; }
        .dim-input-box label { font-size: 9px; color: var(--accent); margin: 0 0 2px 0; }
        .dim-input-box input { width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; text-align: center; font-size: 11px; border-radius: 4px; padding: 3px 0; outline: none; }

        select.custom-select { width: 100%; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--primary); border-radius: var(--radius-sm); color: var(--text-main); font-size: 12px; padding: 8px; outline: none; margin-bottom: 8px; cursor: pointer; font-weight: 600; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-panel-view-presets">
        <button class="reset-view-btn" onclick="switchView('reset'); this.blur();">🏠 預設</button>
        <button onclick="switchView('top'); this.blur();">🗺️ 俯瞰</button>
        <button onclick="switchView('front'); this.blur();">⏹️ 正面</button>
        <button onclick="switchView('left'); this.blur();">⬅️ 左側</button>
        <button onclick="switchView('right'); this.blur();">➡️ 右側</button>
    </div>

    <!-- 左側面板 -->
    <div id="ui-panel-left" class="glass-panel">
        <div class="section" style="background: rgba(0, 132, 255, 0.08); padding: 12px; border-radius: var(--radius-sm); border: 1px solid rgba(0, 132, 255, 0.25);">
            <h3 style="color:#4da6ff;">📂 展場方案與切換</h3>
            <select id="project-select" class="custom-select" onchange="switchProject(this.value)"></select>
            
            <label style="margin-top:2px;">📝 當前方案名稱</label>
            <input type="text" id="expo-title-input" placeholder="例如：2026 台北馬拉松 EXPO" oninput="onTitleInputChange()">

            <div class="two-btn-group" style="margin-top:8px;">
                <button onclick="createNewProject()" style="background-color:rgba(0,132,255,0.2); color:#4da6ff; border-color:rgba(0,132,255,0.4);">➕ 新增方案</button>
                <button onclick="duplicateProject()" style="background-color:rgba(255,255,255,0.06);">📋 複製方案</button>
            </div>
            <button onclick="deleteCurrentProject()" style="background-color:rgba(255,69,58,0.12); color:#ff6961; border-color:rgba(255,69,58,0.25); margin-top:4px; margin-bottom:0;">🗑️ 刪除當前方案</button>
        </div>

        <div class="section">
            <h3>1. 展位範圍與架構</h3>
            <div class="grid-map" id="grid-map"></div>
            <button onclick="clearAllFloors()" style="background-color: rgba(255,255,255,0.04); font-size: 11px; padding: 5px; color: var(--text-secondary);">重設所有格子</button>

            <div class="struct-box">
                <div class="color-picker-row">
                    <span style="font-size:11px; color:var(--text-main); font-weight:500;">🎨 地板顏色</span>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <input type="color" id="floor-color-input" value="#2d2d2d" onchange="setFloorColor(this.value)">
                    </div>
                </div>

                <div class="wall-checkboxes" style="margin-top:8px;">
                    <label><input type="checkbox" id="show-main-grid-check" checked onchange="updateStructureUI()"> 3m 主紅框</label>
                    <label><input type="checkbox" id="show-sub-grid-check" checked onchange="updateStructureUI()"> 1m 細網格</label>
                </div>

                <div class="struct-row" style="margin-top:10px; border-top: 1px dashed rgba(255,255,255,0.08); padding-top:8px;">
                    <span style="font-size: 11px; color: var(--text-main);">🔲 顯示攤位 3D 外框架</span>
                    <input type="checkbox" id="show-frame-check" checked onchange="updateStructureUI()">
                </div>
                
                <div style="font-size: 11px; color: var(--accent); font-weight: 500; margin-top: 10px;">🧱 自選外圍背板牆面</div>
                <div class="wall-checkboxes">
                    <label><input type="checkbox" id="wall-back-check" checked onchange="updateStructureUI()"> 後牆</label>
                    <label><input type="checkbox" id="wall-left-check" checked onchange="updateStructureUI()"> 左牆</label>
                    <label><input type="checkbox" id="wall-right-check" onchange="updateStructureUI()"> 右牆</label>
                    <label><input type="checkbox" id="wall-front-check" onchange="updateStructureUI()"> 前牆</label>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>2. 展具物件庫</h3>
            <button class="action-btn" onclick="createObject('human')" style="background-color: rgba(255, 112, 67, 0.15); color: #ff8a65;">🧍 新增比例模特兒 (170cm)</button>
            <button class="action-btn" onclick="createObject('table')">🪑 新增收銀桌 (100x70x100)</button>
            <button class="action-btn" onclick="createObject('cabinet')">📦 新增中島 (150x60x160)</button>
            <button class="action-btn" onclick="createObject('folding_table')">🏷️ 新增摺疊桌 (120x60x60)</button>
            <button class="action-btn" onclick="createObject('straight_rack')">👗 新增直桿吊衣架 (100x40x160)</button>
            <button class="action-btn" onclick="createObject('round_rack')">⭕ 新增圓盤環形衣架 (80x80x160)</button>
            
            <!-- 鐵網展架按鈕 -->
            <button class="action-btn" onclick="createObject('grid_rack')" style="background-color: rgba(127, 140, 141, 0.2); color: #bdc3c7;">🕸️ 新增落地鐵網展架 (90x35x150)</button>
            <button class="action-btn" onclick="createObject('wall_grid_rack')" style="background-color: rgba(0, 168, 255, 0.2); color: #00a8ff;">🖼️ 新增壁掛鐵網片 (90x5x150)</button>

            <button class="action-btn" onclick="createObject('fitting_room')">🚪 新增更衣室 (100x100x250)</button>
            <button class="action-btn" onclick="createObject('backdrop')">🧱 新增背板 (300x30x250)</button>
            <button class="action-btn" onclick="createObject('wall_shelf')">🪜 新增牆面層架 (100x35x180)</button>
            <button class="action-btn" onclick="createObject('storage')">🏪 新增倉儲區 (150x150x200)</button>
        </div>

        <div class="section">
            <h3>3. 全域檔案與修復</h3>
            <input type="file" id="import-input" accept=".json" style="display:none" onchange="importJSON(event)">
            <button class="load-btn" onclick="document.getElementById('import-input').click()">📂 載入 JSON 配置</button>
            <button class="save-btn" onclick="exportJSON()">💾 儲存／匯出 JSON</button>
            <button class="img-btn" onclick="exportImage()">🖼️ 匯出 PNG 圖檔</button>
            
            <!-- 快取強制修復按鈕 -->
            <button onclick="hardResetApp()" style="background-color:rgba(255,69,58,0.15); color:#ff6961; border-color:rgba(255,69,58,0.3); margin-top:10px;">🧹 系統卡住時：一鍵清快取修復</button>
        </div>
    </div>

    <!-- 左下角說明 -->
    <div id="ui-panel-controls-help">
        <div class="help-title">💡 3D 視角與物件操作說明</div>
        <div class="help-grid">
            <div class="help-item">🖱️ <span class="help-key">右鍵</span> 旋轉視角</div>
            <div class="help-item">⌨️ <span class="help-key">Q</span> / <span class="help-key">E</span> 微轉 15°</div>
            <div class="help-item">🖱️ <span class="help-key">左鍵</span> 選擇/拖拉</div>
            <div class="help-item">⌨️ <span class="help-key">R</span> 旋轉 90°</div>
            <div class="help-item">⌨️ <span class="help-key">W</span> / <span class="help-key">S</span> 升高/降低</div>
            <div class="help-item">⌨️ <span class="help-key">C</span> 快速複製</div>
        </div>
    </div>

    <!-- 右側面板 -->
    <div id="ui-panel-right" class="glass-panel">
        <h3 style="color:var(--accent);">⚙️ 展具屬性與輸出面板</h3>
        <div id="right-obj-title">目前選取：無</div>
        
        <input type="file" id="face-image-upload" accept="image/*" style="display:none;" onchange="handleFaceUpload(event)">

        <div id="wall-segment-control" class="section" style="display: none;">
            <button id="toggle-wall-height-btn" onclick="toggleWallSegmentHeight()">➕ 雙層加高：追加 150cm 頂層看板</button>
            <button onclick="removeSelectedWallSegment()" style="background-color: rgba(255, 69, 58, 0.15); color: #ff6961;">🗑️ 隱藏／移除此段隔牆 (Del)</button>
        </div>

        <div id="normal-object-controls">
            <div id="dimension-control-section" class="section" style="background: rgba(255, 159, 10, 0.06); padding:10px; border-radius:var(--radius-sm);">
                <h4 style="font-size:12px; color:var(--accent); margin-bottom:6px;">📐 尺寸與離地高度 (cm)</h4>
                <div class="dim-input-group">
                    <div class="dim-input-box"><label>寬 W</label><input type="number" id="dim-w" step="5" min="10" onchange="updateSelectedDimensions()"></div>
                    <div class="dim-input-box"><label>深 D</label><input type="number" id="dim-d" step="5" min="1" onchange="updateSelectedDimensions()"></div>
                    <div class="dim-input-box"><label>高 H</label><input type="number" id="dim-h" step="5" min="10" onchange="updateSelectedDimensions()"></div>
                    <div class="dim-input-box" style="border-color: rgba(0, 132, 255, 0.4); background: rgba(0, 132, 255, 0.1);">
                        <label style="color:#4da6ff;">離地 Y</label>
                        <input type="number" id="dim-elevation" step="5" min="0" value="0" onchange="updateSelectedElevation()">
                    </div>
                </div>
            </div>

            <div class="section" style="border-top: none; padding-top: 0;">
                <label>高低微調與操作</label>
                <div class="two-btn-group" style="margin-bottom: 6px;">
                    <button onclick="onKeyDown({key:'w'})">⬆️ 上升 10cm (W)</button>
                    <button onclick="onKeyDown({key:'s'})">⬇️ 下降 10cm (S)</button>
                </div>
                <div class="two-btn-group" style="margin-bottom: 6px;">
                    <button onclick="onKeyDown({key:'q'})">🔄 逆旋 15° (Q)</button>
                    <button onclick="onKeyDown({key:'e'})">🔄 順旋 15° (E)</button>
                </div>
                <button onclick="onKeyDown({key:'r'})">📐 旋轉 90° (R)</button>
                <button onclick="onKeyDown({key:'c'})">📋 快速複製 (C)</button>
                <button onclick="onKeyDown({key:'Delete'})" style="background-color:rgba(255, 69, 58, 0.15); color: #ff6961;">🗑️ 刪除此物件 (Del)</button>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, orbitControls;
        let draggableObjects = [];
        let wallObjects = []; 
        let selectedObject = null;
        
        let disabledWallSegments = []; 
        let elevatedWallSegments = {}; 
        let currentFloorColorHex = '#2d2d2d'; 

        let isDragging = false;
        let isSpacePressed = false; 
        let planeHelper; 
        let dragOffset = new THREE.Vector3();
        let previousPosition = new THREE.Vector3();
        let previousRotation = new THREE.Euler();

        let activeFloorGrid = []; 
        let floorGroup = new THREE.Group(); 
        let structureGroup = new THREE.Group(); 

        let currentTargetUploadFace = 'front';
        let targetCameraPosition = null, targetControlsTarget = null; 
        let ANIMATION_SPEED = 0.08; 

        let SNAP_UNIT = 0.1, GRID_MAP_SIZE = 5, CELL_SIZE = 3, FRAME_HEIGHT = 2.5; 
        let FIXED_WALL_COLOR_HEX = 0x545454;

        let projectsData = {}; 
        let currentProjectId = null;

        let OBJECT_TYPES = {
            human:          { name: '比例模特兒', w: 0.4,  d: 0.3, h: 1.7,  color: 0xff7043 },
            table:          { name: '收銀桌',     w: 1.0,  d: 0.70, h: 1.0, color: 0x32ade6 },
            cabinet:        { name: '中島',       w: 1.5,  d: 0.6, h: 1.6,  color: 0x0084ff },
            folding_table:  { name: '摺疊桌',     w: 1.2,  d: 0.6, h: 0.6,  color: 0x0084ff },
            straight_rack:  { name: '直桿吊衣架', w: 1.0,  d: 0.40, h: 1.6,  color: 0xaf52de }, 
            round_rack:     { name: '圓盤環形衣架', w: 0.8,  d: 0.80, h: 1.6,  color: 0xaf52de }, 
            grid_rack:      { name: '落地鐵網展架', w: 0.9,  d: 0.35, h: 1.5,  color: 0x7f8c8d },
            wall_grid_rack: { name: '壁掛鐵網片',   w: 0.9,  d: 0.05, h: 1.5,  color: 0x00a8ff },
            fitting_room:   { name: '更衣室/試衣間', w: 1.0,  d: 1.00, h: 2.5,  color: FIXED_WALL_COLOR_HEX }, 
            backdrop:       { name: '背板',       w: 3.0,  d: 0.30, h: 2.5,  color: FIXED_WALL_COLOR_HEX }, 
            wall_shelf:     { name: '牆面層架',   w: 1.0,  d: 0.35, h: 1.8,  color: 0x34c759 }, 
            storage:        { name: '倉儲區',     w: 1.5,  d: 1.50, h: 2.0,  color: 0x485460 }
        };

        function hardResetApp() {
            if (confirm("這將會清除所有舊快取並重置展場方案，確定嗎？")) {
                localStorage.clear();
                location.reload();
            }
        }

        function getEmptyLayoutData(title) {
            return {
                expoTitle: title || '新展位方案',
                floorColor: '#2d2d2d',
                showFrame: true, showMainGrid: true, showSubGrid: true,
                walls: { back: true, left: true, right: false, front: false },
                disabledWallSegments: [], elevatedWallSegments: {},
                activeFloorGrid: ['2-2', '2-3'],
                objects: []
            };
        }

        function loadProjectsFromStorage() {
            try {
                let stored = localStorage.getItem('expo_simulator_projects_v2'); // 使用 v2 避開舊相容性崩潰
                if (stored) {
                    let parsed = JSON.parse(stored);
                    projectsData = parsed.projects || {};
                    currentProjectId = parsed.currentProjectId;
                }

                if (!projectsData || Object.keys(projectsData).length === 0) {
                    let pid = 'proj_' + Date.now();
                    projectsData = {};
                    projectsData[pid] = { id: pid, title: '展位配置方案 A', data: getEmptyLayoutData('展位配置方案 A') };
                    currentProjectId = pid;
                }

                if (!currentProjectId || !projectsData[currentProjectId]) {
                    currentProjectId = Object.keys(projectsData)[0];
                }

                updateProjectSelectUI();
                applyProjectDataToScene(projectsData[currentProjectId].data);
            } catch (e) {
                console.error("初始化載入快取失敗，進行防禦性修復:", e);
                localStorage.removeItem('expo_simulator_projects_v2');
                let pid = 'proj_' + Date.now();
                projectsData = {};
                projectsData[pid] = { id: pid, title: '展位配置方案 A', data: getEmptyLayoutData('展位配置方案 A') };
                currentProjectId = pid;
                updateProjectSelectUI();
                applyProjectDataToScene(projectsData[currentProjectId].data);
            }
        }

        function updateProjectSelectUI() {
            let selectDOM = document.getElementById('project-select');
            if (!selectDOM) return;
            selectDOM.innerHTML = '';
            for (let pid in projectsData) {
                let option = document.createElement('option');
                option.value = pid;
                option.innerText = projectsData[pid].title || '未命名場次';
                if (pid === currentProjectId) option.selected = true;
                selectDOM.appendChild(option);
            }
        }

        function switchProject(newPid) {
            if (!projectsData[newPid] || newPid === currentProjectId) return;
            saveToLocalStorage();
            currentProjectId = newPid;
            updateProjectSelectUI();
            applyProjectDataToScene(projectsData[currentProjectId].data);
            saveToLocalStorage();
        }

        function createNewProject() {
            saveToLocalStorage();
            let pid = 'proj_' + Date.now();
            let count = Object.keys(projectsData).length + 1;
            let defaultTitle = `新展位方案 ${count}`;
            projectsData[pid] = { id: pid, title: defaultTitle, data: getEmptyLayoutData(defaultTitle) };
            currentProjectId = pid;
            updateProjectSelectUI();
            applyProjectDataToScene(projectsData[currentProjectId].data);
            createObject('cabinet'); 
            saveToLocalStorage();
        }

        function duplicateProject() {
            if (!currentProjectId || !projectsData[currentProjectId]) return;
            saveToLocalStorage();
            let pid = 'proj_' + Date.now();
            let srcTitle = projectsData[currentProjectId].title || '展位方案';
            let newTitle = `${srcTitle} (副本)`;
            let copiedData = JSON.parse(JSON.stringify(projectsData[currentProjectId].data));
            copiedData.expoTitle = newTitle;
            projectsData[pid] = { id: pid, title: newTitle, data: copiedData };
            currentProjectId = pid;
            updateProjectSelectUI();
            applyProjectDataToScene(copiedData);
            saveToLocalStorage();
        }

        function deleteCurrentProject() {
            if (Object.keys(projectsData).length <= 1) { alert("最少需要保留一個展位方案！"); return; }
            if (confirm(`確定要刪除「${projectsData[currentProjectId].title}」嗎？`)) {
                delete projectsData[currentProjectId];
                currentProjectId = Object.keys(projectsData)[0];
                updateProjectSelectUI();
                applyProjectDataToScene(projectsData[currentProjectId].data);
                saveToLocalStorage();
            }
        }

        function onTitleInputChange() {
            let val = document.getElementById('expo-title-input').value;
            if (currentProjectId && projectsData[currentProjectId]) {
                projectsData[currentProjectId].title = val || '未命名場次';
                updateProjectSelectUI();
                saveToLocalStorage();
            }
        }

        function applyProjectDataToScene(data) {
            draggableObjects.forEach(obj => scene.remove(obj));
            draggableObjects.length = 0;
            selectObject(null);

            document.getElementById('expo-title-input').value = data.expoTitle || '';
            document.getElementById('show-frame-check').checked = (data.showFrame !== undefined) ? data.showFrame : true;
            document.getElementById('show-main-grid-check').checked = (data.showMainGrid !== undefined) ? data.showMainGrid : true;
            document.getElementById('show-sub-grid-check').checked = (data.showSubGrid !== undefined) ? data.showSubGrid : true;

            if (data.floorColor) {
                currentFloorColorHex = data.floorColor;
                document.getElementById('floor-color-input').value = data.floorColor;
            }

            if (data.walls) {
                document.getElementById('wall-back-check').checked = !!data.walls.back;
                document.getElementById('wall-left-check').checked = !!data.walls.left;
                document.getElementById('wall-right-check').checked = !!data.walls.right;
                document.getElementById('wall-front-check').checked = !!data.walls.front;
            }

            disabledWallSegments = data.disabledWallSegments || [];
            elevatedWallSegments = data.elevatedWallSegments || {};

            activeFloorGrid = data.activeFloorGrid || [];
            document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('active'));
            activeFloorGrid.forEach(gridId => {
                let cellDOM = document.getElementById(`cell-${gridId}`);
                if(cellDOM) cellDOM.classList.add('active');
            });

            render3DFloor();

            if (data.objects && data.objects.length > 0) {
                data.objects.forEach(objData => {
                    if (OBJECT_TYPES[objData.type]) {
                        createObject(objData.type, objData.position, objData.rotation, false, objData.images, objData.hasTopLayer, objData.shelfLayers, objData.customDims, objData.elevation || 0);
                    }
                });
            }
        }

        function saveToLocalStorage() {
            if (!currentProjectId || !projectsData[currentProjectId]) return;
            try {
                let titleVal = document.getElementById('expo-title-input').value || '未命名場次';
                let currentLayout = {
                    expoTitle: titleVal,
                    floorColor: currentFloorColorHex,
                    showFrame: document.getElementById('show-frame-check').checked,
                    showMainGrid: document.getElementById('show-main-grid-check').checked,
                    showSubGrid: document.getElementById('show-sub-grid-check').checked,
                    walls: {
                        back: document.getElementById('wall-back-check').checked,
                        left: document.getElementById('wall-left-check').checked,
                        right: document.getElementById('wall-right-check').checked,
                        front: document.getElementById('wall-front-check').checked
                    },
                    disabledWallSegments: disabledWallSegments,
                    elevatedWallSegments: elevatedWallSegments,
                    activeFloorGrid: activeFloorGrid,
                    objects: draggableObjects.map(obj => ({
                        type: obj.userData.type,
                        position: { x: obj.position.x, y: obj.position.y, z: obj.position.z },
                        rotation: { x: obj.rotation.x, y: obj.rotation.y, z: obj.rotation.z },
                        customDims: {
                            w: obj.userData.customW || OBJECT_TYPES[obj.userData.type].w,
                            d: obj.userData.customD || OBJECT_TYPES[obj.userData.type].d,
                            h: obj.userData.customH || OBJECT_TYPES[obj.userData.type].h
                        },
                        elevation: obj.userData.elevation || 0,
                        hasTopLayer: obj.userData.hasTopLayer || false, 
                        shelfLayers: obj.userData.shelfLayers || 3,
                        images: { front: null, left: null, right: null }
                    }))
                };

                projectsData[currentProjectId].title = titleVal;
                projectsData[currentProjectId].data = currentLayout;

                localStorage.setItem('expo_simulator_projects_v2', JSON.stringify({
                    currentProjectId: currentProjectId,
                    projects: projectsData
                }));
            } catch (e) {
                console.warn("自動暫存失敗：", e);
            }
        }

        function init() {
            let container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111113);
            scene.add(floorGroup); 
            scene.add(structureGroup); 

            planeHelper = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 15); 

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.05;
            setOrbitControlsMode(false);

            let ambientLight = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambientLight);
            let topFrontLight = new THREE.DirectionalLight(0xffffff, 0.3); topFrontLight.position.set(0, 15, 10); scene.add(topFrontLight);
            let topBackLight = new THREE.DirectionalLight(0xffffff, 0.2); topBackLight.position.set(0, 15, -10); scene.add(topBackLight);

            buildGridMapUI();
            
            window.addEventListener('pointerdown', onPointerDown, false);
            window.addEventListener('pointermove', onPointerMove, false);
            window.addEventListener('pointerup', onPointerUp, false);
            window.addEventListener('dblclick', function() { selectObject(null); });
            window.addEventListener('keydown', onGlobalKeyDown);
            window.addEventListener('keyup', onGlobalKeyUp);
            window.addEventListener('resize', onWindowResize);

            render3DFloor();
            loadProjectsFromStorage();
            animate();
        }

        function setOrbitControlsMode(spacePressed) {
            if (spacePressed) {
                orbitControls.mouseButtons = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.PAN, RIGHT: THREE.MOUSE.ROTATE };
            } else {
                orbitControls.mouseButtons = { LEFT: THREE.MOUSE.NONE, MIDDLE: THREE.MOUSE.PAN, RIGHT: THREE.MOUSE.ROTATE };
            }
        }

        function switchView(viewType) {
            targetControlsTarget = new THREE.Vector3(0, 0, 0);
            switch (viewType) {
                case 'reset': targetCameraPosition = new THREE.Vector3(0, 12, 15); break;
                case 'top': targetCameraPosition = new THREE.Vector3(0, 18, 0.001); break;
                case 'front': targetCameraPosition = new THREE.Vector3(0, 1.25, 15); break;
                case 'left': targetCameraPosition = new THREE.Vector3(-15, 1.25, 0); break;
                case 'right': targetCameraPosition = new THREE.Vector3(15, 1.25, 0); break;
            }
            if (document.activeElement) document.activeElement.blur();
            window.focus();
        }

        function buildGridMapUI() {
            let mapContainer = document.getElementById('grid-map');
            mapContainer.innerHTML = '';
            for (let r = 0; r < GRID_MAP_SIZE; r++) {
                for (let c = 0; c < GRID_MAP_SIZE; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.id = `cell-${r}-${c}`;
                    cell.innerText = `${r+1},${c+1}`; 
                    cell.addEventListener('click', () => toggleGridCell(r, c));
                    mapContainer.appendChild(cell);
                }
            }
        }

        function toggleGridCell(r, c) {
            let gridId = `${r}-${c}`;
            let cellIndex = activeFloorGrid.indexOf(gridId);
            let cellDOM = document.getElementById(`cell-${r}-${c}`);
            if (cellIndex === -1) {
                activeFloorGrid.push(gridId);
                if(cellDOM) cellDOM.classList.add('active');
            } else {
                activeFloorGrid.splice(cellIndex, 1);
                if(cellDOM) cellDOM.classList.remove('active');
            }
            render3DFloor();
            saveToLocalStorage();
        }

        function clearAllFloors() {
            activeFloorGrid = [];
            document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('active'));
            disabledWallSegments = []; elevatedWallSegments = {};
            render3DFloor(); saveToLocalStorage();
        }

        function resetDisabledWalls() { disabledWallSegments = []; render3DFloor(); saveToLocalStorage(); }
        function setFloorColor(hexColor) { currentFloorColorHex = hexColor; document.getElementById('floor-color-input').value = hexColor; render3DFloor(); saveToLocalStorage(); }
        function updateStructureUI() { render3DFloor(); saveToLocalStorage(); }

        function render3DFloor() {
            while(floorGroup.children.length > 0) floorGroup.remove(floorGroup.children[0]);
            while(structureGroup.children.length > 0) structureGroup.remove(structureGroup.children[0]);
            wallObjects.length = 0; 

            let offset = (GRID_MAP_SIZE * CELL_SIZE) / 2 - (CELL_SIZE / 2);
            let gridMap = Array(GRID_MAP_SIZE).fill(false).map(() => Array(GRID_MAP_SIZE).fill(false));

            let showMainGrid = document.getElementById('show-main-grid-check')?.checked ?? true;
            let showSubGrid = document.getElementById('show-sub-grid-check')?.checked ?? true;

            activeFloorGrid.forEach(gridId => {
                let [r, c] = gridId.split('-').map(Number);
                gridMap[r][c] = true;
                let posX = c * CELL_SIZE - offset;
                let posZ = r * CELL_SIZE - offset;

                let tile = new THREE.Mesh(new THREE.PlaneGeometry(CELL_SIZE, CELL_SIZE), new THREE.MeshBasicMaterial({ color: parseInt(currentFloorColorHex.replace('#', '0x')), side: THREE.DoubleSide }));
                tile.rotation.x = -Math.PI / 2; tile.position.set(posX, 0, posZ);
                floorGroup.add(tile);

                if (showSubGrid) {
                    let fineGrid = new THREE.GridHelper(CELL_SIZE, 3, 0x444444, 0x333333);
                    fineGrid.position.set(posX, 0.002, posZ); floorGroup.add(fineGrid);
                }
                if (showMainGrid) {
                    let mainGrid = new THREE.GridHelper(CELL_SIZE, 1, 0x0084ff, 0x0084ff);
                    mainGrid.position.set(posX, 0.004, posZ); floorGroup.add(mainGrid);
                }
            });

            let showFrame = document.getElementById('show-frame-check').checked;
            let checkBack = document.getElementById('wall-back-check').checked;
            let checkLeft = document.getElementById('wall-left-check').checked;
            let checkRight = document.getElementById('wall-right-check').checked;
            let checkFront = document.getElementById('wall-front-check').checked;

            let lineMat = new THREE.LineBasicMaterial({ color: 0x0084ff, linewidth: 2 });
            let wallThick = 0.05;

            function addFrameLine(x1, z1, x2, z2, y1, y2) {
                let points = [new THREE.Vector3(x1, y1, z1), new THREE.Vector3(x2, y1, z2), new THREE.Vector3(x1, y2, z1), new THREE.Vector3(x2, y2, z2)];
                structureGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(points), lineMat));
            }

            function addVerticalPost(x, z) {
                let points = [new THREE.Vector3(x, 0, z), new THREE.Vector3(x, FRAME_HEIGHT, z)];
                structureGroup.add(new THREE.LineSegments(new THREE.BufferGeometry().setFromPoints(points), lineMat));
            }

            function createWallSegment(w, d, px, pz, segmentId, dirLabel) {
                if (disabledWallSegments.includes(segmentId)) return;
                let wallState = elevatedWallSegments[segmentId] || {};
                let hasTop = wallState.hasTop || false;
                let rIdx = parseInt(segmentId.split('-')[0]), cIdx = parseInt(segmentId.split('-')[1]), dirStr = segmentId.split('-')[2];

                let baseMaterials = [];
                for(let i=0; i<6; i++) baseMaterials.push(new THREE.MeshStandardMaterial({ color: FIXED_WALL_COLOR_HEX, roughness: 0.6 }));
                let baseMesh = new THREE.Mesh(new THREE.BoxGeometry(w, FRAME_HEIGHT, d), baseMaterials);
                baseMesh.position.set(px, FRAME_HEIGHT / 2, pz);
                baseMesh.userData = { type: 'booth_wall', segmentId: segmentId, r: rIdx, c: cIdx, dir: dirStr, hasTopLayer: hasTop, name: `展會外圍牆面 (${dirLabel})` };
                
                structureGroup.add(baseMesh); wallObjects.push(baseMesh);

                if (hasTop) {
                    let topH = 1.5;
                    let topMaterials = [];
                    for(let i=0; i<6; i++) topMaterials.push(new THREE.MeshStandardMaterial({ color: FIXED_WALL_COLOR_HEX, roughness: 0.6 }));
                    let topMesh = new THREE.Mesh(new THREE.BoxGeometry(w, topH, d), topMaterials);
                    topMesh.position.set(px, FRAME_HEIGHT + topH / 2, pz);
                    topMesh.userData = { type: 'booth_wall_top', segmentId: segmentId, r: rIdx, c: cIdx, dir: dirStr, name: `外圍牆面頂層看板 (${dirLabel})` };
                    structureGroup.add(topMesh); wallObjects.push(topMesh);
                }
            }

            for (let r = 0; r < GRID_MAP_SIZE; r++) {
                for (let c = 0; c < GRID_MAP_SIZE; c++) {
                    if (!gridMap[r][c]) continue;
                    let posX = c * CELL_SIZE - offset, posZ = r * CELL_SIZE - offset;
                    let minX = posX - CELL_SIZE / 2, maxX = posX + CELL_SIZE / 2;
                    let minZ = posZ - CELL_SIZE / 2, maxZ = posZ + CELL_SIZE / 2;

                    if (r === 0 || !gridMap[r - 1][c]) {
                        if (checkBack) createWallSegment(CELL_SIZE, wallThick, posX, minZ - wallThick/2, `${r}-${c}-back`, '後牆');
                        if (showFrame) { addFrameLine(minX, minZ, maxX, minZ, 0, FRAME_HEIGHT); addVerticalPost(minX, minZ); addVerticalPost(maxX, minZ); }
                    }
                    if (r === GRID_MAP_SIZE - 1 || !gridMap[r + 1][c]) {
                        if (checkFront) createWallSegment(CELL_SIZE, wallThick, posX, maxZ + wallThick/2, `${r}-${c}-front`, '前牆');
                        if (showFrame) { addFrameLine(minX, maxZ, maxX, maxZ, 0, FRAME_HEIGHT); addVerticalPost(minX, maxZ); addVerticalPost(maxX, maxZ); }
                    }
                    if (c === 0 || !gridMap[r][c - 1]) {
                        if (checkLeft) createWallSegment(wallThick, CELL_SIZE, minX - wallThick/2, posZ, `${r}-${c}-left`, '左牆');
                        if (showFrame) { addFrameLine(minX, minZ, minX, maxZ, 0, FRAME_HEIGHT); addVerticalPost(minX, minZ); addVerticalPost(minX, maxZ); }
                    }
                    if (c === GRID_MAP_SIZE - 1 || !gridMap[r][c + 1]) {
                        if (checkRight) createWallSegment(wallThick, CELL_SIZE, maxX + wallThick/2, posZ, `${r}-${c}-right`, '右牆');
                        if (showFrame) { addFrameLine(maxX, minZ, maxX, maxZ, 0, FRAME_HEIGHT); addVerticalPost(maxX, minZ); addVerticalPost(maxX, maxZ); }
                    }
                }
            }
        }

        /* 1. 落地鐵網展架 (帶支架) */
        function createGridRackGeometry(data, customW = null, customD = null, customH = null) {
            let group = new THREE.Group();
            let w = customW || data.w, d = customD || data.d, h = customH || data.h;
            let frameRadius = 0.012, wireRadius = 0.003;
            let matMetal = new THREE.MeshStandardMaterial({ color: 0x424242, metalness: 0.7, roughness: 0.3 });
            let matWire = new THREE.MeshStandardMaterial({ color: 0x7f8c8d, metalness: 0.8, roughness: 0.2 });

            let leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.03, d), matMetal); leftLeg.position.set(-w/2 + 0.02, -h/2 + 0.015, 0);
            let rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.03, d), matMetal); rightLeg.position.set(w/2 - 0.02, -h/2 + 0.015, 0);
            let botCrossBar = new THREE.Mesh(new THREE.BoxGeometry(w, 0.03, 0.03), matMetal); botCrossBar.position.set(0, -h/2 + 0.015, 0);
            group.add(leftLeg, rightLeg, botCrossBar);

            let leftPost = new THREE.Mesh(new THREE.CylinderGeometry(frameRadius, frameRadius, h - 0.03, 16), matMetal); leftPost.position.set(-w/2 + 0.015, 0.015, 0);
            let rightPost = new THREE.Mesh(new THREE.CylinderGeometry(frameRadius, frameRadius, h - 0.03, 16), matMetal); rightPost.position.set(w/2 - 0.015, 0.015, 0);
            let topBar = new THREE.Mesh(new THREE.CylinderGeometry(frameRadius, frameRadius, w, 16), matMetal); topBar.rotation.z = Math.PI / 2; topBar.position.set(0, h/2 - 0.012, 0);
            group.add(leftPost, rightPost, topBar);

            let gridStep = 0.1;
            let vertWireGeo = new THREE.CylinderGeometry(wireRadius, wireRadius, h - 0.08, 8);
            for (let x = -w/2 + gridStep; x < w/2 - 0.02; x += gridStep) {
                let vWire = new THREE.Mesh(vertWireGeo, matWire); vWire.position.set(x, 0, 0); group.add(vWire);
            }
            let horizWireGeo = new THREE.CylinderGeometry(wireRadius, wireRadius, w - 0.04, 8);
            for (let y = -h/2 + gridStep; y < h/2 - 0.05; y += gridStep) {
                let hWire = new THREE.Mesh(horizWireGeo, matWire); hWire.rotation.z = Math.PI / 2; hWire.position.set(0, y, 0); group.add(hWire);
            }
            return group;
        }

        /* 2. 壁掛鐵網片 (無支架) */
        function createWallGridRackGeometry(data, customW = null, customD = null, customH = null) {
            let group = new THREE.Group();
            let w = customW || data.w, h = customH || data.h;
            let frameRadius = 0.008, wireRadius = 0.003;
            let matMetal = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
            let matWire = new THREE.MeshStandardMaterial({ color: 0x00a8ff, metalness: 0.6, roughness: 0.3 });

            let leftPost = new THREE.Mesh(new THREE.CylinderGeometry(frameRadius, frameRadius, h, 12), matMetal); leftPost.position.set(-w/2 + frameRadius, 0, 0);
            let rightPost = new THREE.Mesh(new THREE.CylinderGeometry(frameRadius, frameRadius, h, 12), matMetal); rightPost.position.set(w/2 - frameRadius, 0, 0);
            let topPost = new THREE.Mesh(new THREE.CylinderGeometry(frameRadius, frameRadius, w, 12), matMetal); topPost.rotation.z = Math.PI / 2; topPost.position.set(0, h/2 - frameRadius, 0);
            let botPost = new THREE.Mesh(new THREE.CylinderGeometry(frameRadius, frameRadius, w, 12), matMetal); botPost.rotation.z = Math.PI / 2; botPost.position.set(0, -h/2 + frameRadius, 0);
            group.add(leftPost, rightPost, topPost, botPost);

            let gridStep = 0.1;
            let vertWireGeo = new THREE.CylinderGeometry(wireRadius, wireRadius, h - 0.02, 8);
            for (let x = -w/2 + gridStep; x < w/2 - 0.02; x += gridStep) {
                let vWire = new THREE.Mesh(vertWireGeo, matWire); vWire.position.set(x, 0, 0); group.add(vWire);
            }
            let horizWireGeo = new THREE.CylinderGeometry(wireRadius, wireRadius, w - 0.02, 8);
            for (let y = -h/2 + gridStep; y < h/2 - 0.02; y += gridStep) {
                let hWire = new THREE.Mesh(horizWireGeo, matWire); hWire.rotation.z = Math.PI / 2; hWire.position.set(0, y, 0); group.add(hWire);
            }
            return group;
        }

        function createShelfGeometry(data, layersCount, customW = null, customD = null, customH = null) {
            let group = new THREE.Group();
            let w = customW || data.w, d = customD || data.d, h = customH || data.h;
            let backMesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.02), new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.6 }));
            backMesh.position.set(0, 0, -d/2 + 0.01); group.add(backMesh);

            let poleMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 });
            let leftPole = new THREE.Mesh(new THREE.BoxGeometry(0.03, h, d), poleMat); leftPole.position.set(-w/2 + 0.015, 0, 0);
            let rightPole = new THREE.Mesh(new THREE.BoxGeometry(0.03, h, d), poleMat); rightPole.position.set(w/2 - 0.015, 0, 0);
            group.add(leftPole, rightPole);

            let boardGeo = new THREE.BoxGeometry(w - 0.04, 0.03, d - 0.02);
            let boardMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.5 });
            let startY = -h/2 + 0.2, endY = h/2 - 0.1;
            let stepY = layersCount > 1 ? (endY - startY) / (layersCount - 1) : 0;
            for (let i = 0; i < layersCount; i++) {
                let board = new THREE.Mesh(boardGeo, boardMat);
                board.position.set(0, (layersCount === 1) ? 0 : (startY + i * stepY), 0.01); group.add(board);
            }
            return group;
        }

        function createStraightRackGeometry(data, customW = null, customD = null, customH = null) {
            let group = new THREE.Group();
            let w = customW || data.w, d = customD || data.d, h = customH || data.h;
            let matMetal = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 });
            let leftPole = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, h, 16), matMetal); leftPole.position.set(-w/2 + 0.05, 0, 0);
            let rightPole = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, h, 16), matMetal); rightPole.position.set(w/2 - 0.05, 0, 0);
            let topBar = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.018, w, 16), matMetal); topBar.rotation.z = Math.PI / 2; topBar.position.set(0, h/2 - 0.02, 0);
            group.add(leftPole, rightPole, topBar);
            return group;
        }

        function createRoundRackGeometry(data, customW = null, customD = null, customH = null) {
            let group = new THREE.Group();
            let radius = (customW || data.w) / 2, h = customH || data.h;
            let matMetal = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 });
            let pole = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, h, 24), matMetal);
            let ring = new THREE.Mesh(new THREE.TorusGeometry(radius, 0.018, 16, 48), matMetal); ring.rotation.x = Math.PI / 2; ring.position.set(0, h/2 - 0.05, 0);
            group.add(pole, ring);
            return group;
        }

        function createFittingRoomGeometry(data, customW = null, customD = null, customH = null, hasTopLayer = false) {
            let group = new THREE.Group();
            let w = customW || data.w, d = customD || data.d, h = customH || data.h;
            let wallMat = new THREE.MeshStandardMaterial({ color: FIXED_WALL_COLOR_HEX, roughness: 0.6 });
            let backWall = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.03), wallMat); backWall.position.set(0, 0, -d/2 + 0.015);
            let leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.03, h, d - 0.03), wallMat); leftWall.position.set(-w/2 + 0.015, 0, 0.015);
            let rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.03, h, d - 0.03), wallMat); rightWall.position.set(w/2 - 0.015, 0, 0.015);
            group.add(backWall, leftWall, rightWall);
            return group;
        }

        function createHumanGeometry(finalW, finalD, finalH) {
            let group = new THREE.Group();
            let skinMat = new THREE.MeshStandardMaterial({ color: 0xff7043, roughness: 0.5 }); 
            let head = new THREE.Mesh(new THREE.SphereGeometry(0.11, 16, 16), skinMat); head.position.set(0, finalH / 2 - 0.11, 0);
            let torso = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.65, 0.18), skinMat); torso.position.set(0, finalH / 2 - 0.22 - 0.325, 0);
            group.add(head, torso);
            return group;
        }

        function createObject(type, customPos = null, customRot = null, shouldSave = true, savedImages = null, hasTopLayer = false, shelfLayers = 3, customDims = null, elevation = 0) {
            let data = OBJECT_TYPES[type];
            if (!data) return;

            let finalW = customDims?.w || data.w;
            let finalD = customDims?.d || data.d;
            let finalH = customDims?.h || data.h;

            if (type === 'wall_grid_rack' && customPos === null && elevation === 0) {
                elevation = 0.8; // 壁掛鐵網預設離地 80cm
            }

            let finalMesh;

            if (type === 'human') {
                let humanGroup = createHumanGeometry(finalW, finalD, finalH);
                finalMesh = new THREE.Mesh(new THREE.BoxGeometry(finalW, finalH, finalD), new THREE.MeshStandardMaterial({ transparent: true, opacity: 0.0 }));
                finalMesh.add(humanGroup);
            } else if (type === 'wall_shelf') {
                let shelfGroup = createShelfGeometry(data, shelfLayers, finalW, finalD, finalH);
                finalMesh = new THREE.Mesh(new THREE.BoxGeometry(finalW, finalH, finalD), new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.6 }));
                finalMesh.add(shelfGroup);
            } else if (type === 'straight_rack') {
                let straightGroup = createStraightRackGeometry(data, finalW, finalD, finalH);
                finalMesh = new THREE.Mesh(new THREE.BoxGeometry(finalW, finalH, finalD), new THREE.MeshStandardMaterial({ transparent: true, opacity: 0.0 }));
                finalMesh.add(straightGroup);
            } else if (type === 'round_rack') {
                let roundGroup = createRoundRackGeometry(data, finalW, finalD, finalH);
                finalMesh = new THREE.Mesh(new THREE.BoxGeometry(finalW, finalH, finalD), new THREE.MeshStandardMaterial({ transparent: true, opacity: 0.0 }));
                finalMesh.add(roundGroup);
            } else if (type === 'grid_rack') { 
                let gridGroup = createGridRackGeometry(data, finalW, finalD, finalH);
                finalMesh = new THREE.Mesh(new THREE.BoxGeometry(finalW, finalH, finalD), new THREE.MeshStandardMaterial({ transparent: true, opacity: 0.0 }));
                finalMesh.add(gridGroup);
            } else if (type === 'wall_grid_rack') { 
                let wallGridGroup = createWallGridRackGeometry(data, finalW, finalD, finalH);
                finalMesh = new THREE.Mesh(new THREE.BoxGeometry(finalW, finalH, finalD), new THREE.MeshStandardMaterial({ transparent: true, opacity: 0.0 }));
                finalMesh.add(wallGridGroup);
            } else if (type === 'fitting_room') {
                let fittingRoomGroup = createFittingRoomGeometry(data, finalW, finalD, finalH, hasTopLayer);
                finalMesh = new THREE.Group();
                finalMesh.add(fittingRoomGroup);
            } else {
                let materials = [];
                for(let i=0; i<6; i++) materials.push(new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.6 }));
                finalMesh = new THREE.Mesh(new THREE.BoxGeometry(finalW, finalH, finalD), materials);
            }

            let posY = finalH / 2 + elevation;

            if (customPos) {
                finalMesh.position.set(customPos.x, (customPos.y !== undefined ? customPos.y : posY), customPos.z);
            } else {
                let initZ = (type === 'wall_grid_rack' || type === 'backdrop' || type === 'wall_shelf') ? -1.4 : 0;
                finalMesh.position.set(0, posY, initZ);
            }
            
            if (customRot) finalMesh.rotation.set(customRot.x, customRot.y, customRot.z);

            finalMesh.userData = { 
                type: type, height: finalH, customW: finalW, customD: finalD, customH: finalH,
                elevation: elevation, hasTopLayer: hasTopLayer, shelfLayers: shelfLayers, images: savedImages || {} 
            };
            
            scene.add(finalMesh);
            draggableObjects.push(finalMesh);
            selectObject(finalMesh);

            if (shouldSave) saveToLocalStorage();
        }

        function updateSelectedDimensions() {
            if (!selectedObject || selectedObject.userData.type === 'booth_wall') return;

            let wInput = parseFloat(document.getElementById('dim-w').value) / 100; 
            let dInput = parseFloat(document.getElementById('dim-d').value) / 100;
            let hInput = parseFloat(document.getElementById('dim-h').value) / 100;
            let elevInput = parseFloat(document.getElementById('dim-elevation').value) / 100 || 0;

            if (isNaN(wInput) || isNaN(dInput) || isNaN(hInput) || wInput <= 0 || dInput <= 0 || hInput <= 0) return;

            let type = selectedObject.userData.type;
            let pos = { x: selectedObject.position.x, y: hInput / 2 + elevInput, z: selectedObject.position.z };
            let rot = { x: selectedObject.rotation.x, y: selectedObject.rotation.y, z: selectedObject.rotation.z };
            let imgs = selectedObject.userData.images;

            scene.remove(selectedObject);
            draggableObjects = draggableObjects.filter(o => o !== selectedObject);

            createObject(type, pos, rot, true, imgs, false, 3, { w: wInput, d: dInput, h: hInput }, elevInput);
        }

        function updateSelectedElevation() {
            if (!selectedObject || selectedObject.userData.type === 'booth_wall') return;
            let elevInput = parseFloat(document.getElementById('dim-elevation').value) / 100 || 0;
            let h = selectedObject.userData.customH || OBJECT_TYPES[selectedObject.userData.type].h;

            selectedObject.userData.elevation = elevInput;
            selectedObject.position.y = h / 2 + elevInput;
            saveToLocalStorage();
        }

        function onPointerDown(event) {
            if (event.clientX < 350 || event.clientX > window.innerWidth - 350 || event.clientY < 80) return;
            if (isSpacePressed) return; 

            let raycaster = new THREE.Raycaster();
            let mouse = new THREE.Vector2((event.clientX / window.innerWidth) * 2 - 1, -(event.clientY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(mouse, camera);

            let targets = [...draggableObjects, ...wallObjects];
            let intersects = raycaster.intersectObjects(targets, true);

            if (intersects.length > 0) {
                let hitObject = intersects[0].object;
                while (hitObject.parent && hitObject.parent !== scene && !hitObject.userData.type) {
                    hitObject = hitObject.parent;
                }
                selectObject(hitObject);
                if (hitObject.userData.type !== 'booth_wall' && hitObject.userData.type !== 'booth_wall_top') {
                    isDragging = true;
                    previousPosition.copy(hitObject.position);
                    previousRotation.copy(hitObject.rotation);
                    let intersectionPoint = new THREE.Vector3();
                    raycaster.ray.intersectPlane(planeHelper, intersectionPoint);
                    dragOffset.copy(hitObject.position).sub(intersectionPoint);
                }
            } else { selectObject(null); }
        }

        function onPointerMove(event) {
            if (isSpacePressed || !isDragging || !selectedObject || selectedObject.userData.type === 'booth_wall') return;
            let raycaster = new THREE.Raycaster();
            let mouse = new THREE.Vector2((event.clientX / window.innerWidth) * 2 - 1, -(event.clientY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(mouse, camera);
            let intersectionPoint = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(planeHelper, intersectionPoint)) {
                let elev = selectedObject.userData.elevation || 0;
                selectedObject.position.copy(intersectionPoint.add(dragOffset));
                selectedObject.position.y = selectedObject.userData.height / 2 + elev;
            }
        }

        function onPointerUp() {
            orbitControls.mouseButtons.LEFT = THREE.MOUSE.NONE;
            if (isSpacePressed || !isDragging) return;
            isDragging = false; 
            if (selectedObject) {
                selectedObject.position.x = Math.round(selectedObject.position.x / SNAP_UNIT) * SNAP_UNIT;
                selectedObject.position.z = Math.round(selectedObject.position.z / SNAP_UNIT) * SNAP_UNIT;
                saveToLocalStorage();
            }
        }

        function selectObject(obj) {
            selectedObject = obj;
            let rightPanel = document.getElementById('ui-panel-right');
            if (selectedObject) {
                rightPanel.style.display = 'block';
                updateRightPanelUI();
            } else {
                rightPanel.style.display = 'none';
            }
        }

        function updateRightPanelUI() {
            if(!selectedObject) return;
            let type = selectedObject.userData.type;
            let typeName = OBJECT_TYPES[type]?.name || '展具';
            document.getElementById('right-obj-title').innerText = `目前選取：${typeName}`;

            let curW = selectedObject.userData.customW || OBJECT_TYPES[type].w;
            let curD = selectedObject.userData.customD || OBJECT_TYPES[type].d;
            let curH = selectedObject.userData.customH || OBJECT_TYPES[type].h;
            let curElev = selectedObject.userData.elevation || 0;

            document.getElementById('dim-w').value = Math.round(curW * 100);
            document.getElementById('dim-d').value = Math.round(curD * 100);
            document.getElementById('dim-h').value = Math.round(curH * 100);
            document.getElementById('dim-elevation').value = Math.round(curElev * 100);
        }

        function onGlobalKeyDown(event) {
            if (document.activeElement.tagName === 'INPUT') return;
            if (event.key === " " || event.keyCode === 32) {
                isSpacePressed = true; setOrbitControlsMode(true); event.preventDefault();
            } else { onKeyDown(event); }
        }

        function onGlobalKeyUp(event) {
            if (document.activeElement.tagName === 'INPUT') return;
            if (event.key === " " || event.keyCode === 32) {
                isSpacePressed = false; setOrbitControlsMode(false); event.preventDefault();
            }
        }

        function onKeyDown(event) {
            if (!selectedObject) return;
            let key = event.key.toLowerCase();
            let currentElev = selectedObject.userData.elevation || 0;
            let h = selectedObject.userData.customH || OBJECT_TYPES[selectedObject.userData.type].h;

            switch (key) {
                case 'w':
                    currentElev += 0.1;
                    selectedObject.userData.elevation = currentElev;
                    selectedObject.position.y = h / 2 + currentElev;
                    updateRightPanelUI(); saveToLocalStorage();
                    break;
                case 's':
                    currentElev = Math.max(0, currentElev - 0.1);
                    selectedObject.userData.elevation = currentElev;
                    selectedObject.position.y = h / 2 + currentElev;
                    updateRightPanelUI(); saveToLocalStorage();
                    break;
                case 'r':
                    selectedObject.rotation.y += Math.PI / 2; saveToLocalStorage();
                    break;
                case 'q': selectedObject.rotation.y -= Math.PI / 12; saveToLocalStorage(); break;
                case 'e': selectedObject.rotation.y += Math.PI / 12; saveToLocalStorage(); break;
                case 'delete': case 'backspace':
                    scene.remove(selectedObject);
                    draggableObjects = draggableObjects.filter(o => o !== selectedObject);
                    selectObject(null); saveToLocalStorage();
                    break;
            }
        }

        function exportJSON() {
            let layoutData = projectsData[currentProjectId]?.data || {};
            let dataStr = JSON.stringify(layoutData, null, 2);
            let blob = new Blob([dataStr], { type: "application/json" });
            let url = URL.createObjectURL(blob);
            let downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", url);
            downloadAnchor.setAttribute("download", `EXPO_Layout_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(downloadAnchor); downloadAnchor.click(); downloadAnchor.remove();
        }

        function importJSON(event) {
            let file = event.target.files[0]; if (!file) return;
            let reader = new FileReader();
            reader.onload = function(e) {
                let data = JSON.parse(e.target.result);
                let pid = 'proj_' + Date.now();
                projectsData[pid] = { id: pid, title: data.expoTitle || '匯入方案', data: data };
                currentProjectId = pid;
                updateProjectSelectUI(); applyProjectDataToScene(data); saveToLocalStorage();
            };
            reader.readAsText(file);
        }

        function exportImage() {
            renderer.render(scene, camera);
            let imgData = renderer.domElement.toDataURL("image/png");
            let downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", imgData);
            downloadAnchor.setAttribute("download", `EXPO_Snapshot.png`);
            document.body.appendChild(downloadAnchor); downloadAnchor.click(); downloadAnchor.remove();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (targetCameraPosition) camera.position.lerp(targetCameraPosition, ANIMATION_SPEED);
            if (targetControlsTarget) orbitControls.target.lerp(targetControlsTarget, ANIMATION_SPEED);
            orbitControls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
